<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="今晚写点啥：睡前脑子停不下来时，写几句，内容只保存在本机。"
    />
    <title>今晚写点啥</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="styles.css?v=20260707-title-fix" />
  </head>
  <body>
    <main id="nightWriter" class="night-writer" aria-label="睡前写作区">
      <div class="nw-glow" aria-hidden="true"></div>
      <div class="nw-vignette" aria-hidden="true"></div>
      <div id="keywordLayer" class="nw-keyword-layer" aria-label="关键词星点"></div>
      <p id="introNote" class="nw-intro-note">本机保存<br />不登录，不上传</p>

      <textarea
        id="writingInput"
        class="nw-textarea"
        aria-label="今晚想写点什么"
        autocomplete="off"
        autocapitalize="off"
        spellcheck="false"
        placeholder="写下今晚脑子里放不下的东西…"
      ></textarea>

      <button
        id="historyToggle"
        class="nw-history-dot"
        type="button"
        aria-label="查看过去 7 天"
        aria-expanded="false"
        aria-controls="historyPanel"
      >
        <span id="historyHint" class="nw-history-hint" aria-hidden="true">过去 7 天</span>
      </button>

      <section id="historyPanel" class="nw-history-panel" aria-label="过去 7 天" aria-hidden="true">
        <div class="nw-history-top">
          <button id="historyBack" class="nw-history-back" type="button" aria-label="返回历史列表" hidden></button>
          <h2 id="historyTitle">过去 7 天</h2>
          <button id="historyClose" class="nw-history-close" type="button" aria-label="关闭历史"></button>
        </div>
        <div id="historyList" class="nw-history-list"></div>
        <article id="historyDetail" class="nw-history-detail" aria-hidden="true" hidden>
          <div id="historyDetailDate" class="nw-history-detail-date"></div>
          <div id="historyDetailText" class="nw-history-detail-text"></div>
        </article>
        <div class="nw-history-footer">
          <button id="exportAll" class="nw-export-all" type="button">导出全部</button>
          <p id="privacyNote" class="nw-privacy-note">不登录，不上传，只保存在这台设备。清理浏览器数据会丢失。</p>
        </div>
      </section>

      <div id="goodnightSignal" class="nw-goodnight" aria-hidden="true">晚安</div>
      <button id="clearTonight" class="nw-clear-tonight" type="button">清空今晚</button>
      <section id="clearPanel" class="nw-clear-panel" aria-label="清空确认" aria-hidden="true">
        <p class="nw-clear-question">清空今晚写下的内容？</p>
        <div class="nw-clear-actions">
          <button id="clearKeep" class="nw-clear-action nw-clear-keep" type="button">保留</button>
          <button id="clearConfirm" class="nw-clear-action nw-clear-confirm" type="button">清空</button>
        </div>
      </section>
      <div id="saveStatus" class="nw-save-status" aria-live="polite">内容只保存在本机</div>
    </main>

    <script src="app.js?v=20260707-title-fix"></script>
  </body>
</html>
